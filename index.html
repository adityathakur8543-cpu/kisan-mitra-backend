<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>किसान मित्र | Kisan Mitra</title>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Mukta:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green-deep: #1a4a2e;
      --green-mid: #2d7a4f;
      --green-light: #4caf78;
      --gold: #e8a020;
      --gold-light: #f5c84a;
      --soil: #8b5e3c;
      --cream: #fdf6e3;
      --cream-dark: #f0e6c8;
      --white: #ffffff;
      --text-dark: #1a2e1a;
      --text-mid: #3d5a3d;
      --text-light: #6b8f6b;
      --shadow: 0 8px 32px rgba(26,74,46,0.15);
      --shadow-strong: 0 16px 48px rgba(26,74,46,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Mukta', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(45,122,79,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(232,160,32,0.08) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232d7a4f' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
      padding: 0;
      box-shadow: var(--shadow-strong);
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
    }

    /* Decorative wheat pattern in header */
    header::before {
      content: '🌾';
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 120px;
      opacity: 0.06;
      pointer-events: none;
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 16px rgba(232,160,32,0.4);
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      color: var(--white);
      letter-spacing: 0.5px;
      line-height: 1.1;
    }

    .logo-text p {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.65);
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Language Toggle */
    .lang-toggle {
      display: flex;
      background: rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 4px;
      border: 1px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .lang-btn {
      padding: 6px 16px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      border-radius: 24px;
      cursor: pointer;
      font-family: 'Mukta', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .lang-btn.active {
      background: var(--gold);
      color: var(--green-deep);
      box-shadow: 0 2px 8px rgba(232,160,32,0.4);
    }

    /* MAIN CONTAINER */
    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 100px;
    }

    /* QUICK TOPICS */
    .quick-topics {
      margin-bottom: 20px;
      animation: fadeUp 0.5s ease both;
    }

    .quick-topics-label {
      font-size: 0.75rem;
      color: var(--text-light);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .topics-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .topic-chip {
      padding: 7px 14px;
      background: var(--white);
      border: 1.5px solid var(--cream-dark);
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--green-mid);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .topic-chip:hover, .topic-chip:active {
      background: var(--green-mid);
      color: var(--white);
      border-color: var(--green-mid);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(45,122,79,0.25);
    }

    /* CHAT AREA */
    .chat-box {
      background: var(--white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--cream-dark);
      min-height: 380px;
      max-height: 480px;
      overflow-y: auto;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-track { background: transparent; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 4px; }

    /* Welcome message */
    .welcome-msg {
      text-align: center;
      padding: 30px 20px;
      animation: fadeIn 0.6s ease;
    }

    .welcome-icon {
      font-size: 52px;
      margin-bottom: 12px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome-msg h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--green-deep);
      margin-bottom: 8px;
    }

    .welcome-msg p {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* Messages */
    .message {
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .msg-avatar {
      background: linear-gradient(135deg, var(--green-mid), var(--green-light));
    }

    .message.bot .msg-avatar {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
    }

    .msg-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.65;
    }

    .message.user .msg-bubble {
      background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
      color: var(--white);
      border-bottom-right-radius: 4px;
    }

    .message.bot .msg-bubble {
      background: var(--cream);
      color: var(--text-dark);
      border: 1px solid var(--cream-dark);
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--cream);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--cream-dark);
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--green-mid);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* INPUT AREA */
    .input-area {
      position: relative;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      background: var(--white);
      border-radius: 16px;
      padding: 8px 8px 8px 16px;
      border: 2px solid var(--cream-dark);
      box-shadow: var(--shadow);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      align-items: flex-end;
    }

    .input-wrapper:focus-within {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 4px rgba(45,122,79,0.1), var(--shadow);
    }

    #userInput {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Mukta', sans-serif;
      font-size: 0.95rem;
      color: var(--text-dark);
      background: transparent;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      line-height: 1.5;
      padding: 4px 0;
    }

    #userInput::placeholder { color: var(--text-light); }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--green-mid), var(--green-light));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(45,122,79,0.3);
    }

    .send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 16px rgba(45,122,79,0.4); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 20px; height: 20px; fill: white; }

    /* MIC BUTTON */
    .mic-btn {
      width: 44px;
      height: 44px;
      background: var(--cream);
      border: 1.5px solid var(--cream-dark);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .mic-btn:hover { background: var(--cream-dark); }
    .mic-btn.recording { background: #fee; border-color: #e55; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229,85,85,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(229,85,85,0); }
    }

    /* STATUS BAR */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green-light);
      animation: statusPulse 2s infinite;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 0.75rem;
      color: var(--text-light);
    }

    /* ERROR */
    .error-msg {
      background: #fff5f5;
      border: 1px solid #fcc;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #c00;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 16px;
      font-size: 0.75rem;
      color: var(--text-light);
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .header-inner { padding: 14px 16px 12px; }
      .logo-text h1 { font-size: 1.4rem; }
      .logo-icon { width: 46px; height: 46px; font-size: 24px; }
      .msg-bubble { max-width: 88%; font-size: 0.88rem; }
      .chat-box { min-height: 320px; max-height: 400px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-icon">🌱</div>
      <div class="logo-text">
        <h1 id="appTitle">किसान मित्र</h1>
        <p id="appSubtitle">AI कृषि सहायक • Bihar</p>
      </div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnHi" onclick="setLang('hi')">हिंदी</button>
      <button class="lang-btn" id="btnEn" onclick="setLang('en')">English</button>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="container">

  <!-- Quick Topics -->
  <div class="quick-topics">
    <div class="quick-topics-label" id="topicsLabel">जल्दी पूछें</div>
    <div class="topics-grid" id="topicsGrid">
      <button class="topic-chip" onclick="quickAsk('फसल में कीट लग गए हैं, क्या करूं?')">🐛 कीट नियंत्रण</button>
      <button class="topic-chip" onclick="quickAsk('मिट्टी की जांच कैसे करें?')">🌍 मिट्टी जांच</button>
      <button class="topic-chip" onclick="quickAsk('गाय को बुखार है, क्या दवाई दें?')">🐄 पशु स्वास्थ्य</button>
      <button class="topic-chip" onclick="quickAsk('PM किसान योजना के बारे में बताएं')">📋 सरकारी योजना</button>
      <button class="topic-chip" onclick="quickAsk('धान की खेती कब और कैसे करें?')">🌾 धान खेती</button>
      <button class="topic-chip" onclick="quickAsk('मौसम के अनुसार कौन सी फसल लगाएं?')">☁️ मौसम सलाह</button>
    </div>
  </div>

  <!-- Chat Box -->
  <div class="chat-box" id="chatBox">
    <div class="welcome-msg" id="welcomeMsg">
      <span class="welcome-icon">🌾</span>
      <h2 id="welcomeTitle">नमस्ते किसान भाई!</h2>
      <p id="welcomeText">मैं आपका AI कृषि सहायक हूं। फसल, पशु, मिट्टी, मौसम या सरकारी योजनाओं के बारे में कुछ भी पूछें।</p>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        rows="1"
        placeholder="अपना सवाल यहाँ लिखें..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice input">🎤</button>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="status-bar">
      <div class="status-dot"></div>
      <span class="status-text" id="statusText">AI सक्रिय है • कभी भी पूछें</span>
    </div>
  </div>

</div>

<footer>
  किसान मित्र v2.0 • Powered by Claude AI • Made with ❤️ for Bihar Farmers
</footer>

<script>
  // ============================================
  // CONFIGURATION — Change this after deploying backend
  // ============================================
  const BACKEND_URL = "";
  // For local testing without backend, set USE_DIRECT_API = true and add your key below
  const USE_DIRECT_API = false;
  const DIRECT_API_KEY = ""; // Only for local testing — NEVER ship this in APK

  // ============================================
  // STATE
  // ============================================
  let currentLang = "hi";
  let isLoading = false;
  let recognition = null;
  let isRecording = false;
  let chatHistory = [];

  // ============================================
  // TRANSLATIONS
  // ============================================
  const t = {
    hi: {
      appTitle: "किसान मित्र",
      appSubtitle: "AI कृषि सहायक • Bihar",
      topicsLabel: "जल्दी पूछें",
      welcomeTitle: "नमस्ते किसान भाई!",
      welcomeText: "मैं आपका AI कृषि सहायक हूं। फसल, पशु, मिट्टी, मौसम या सरकारी योजनाओं के बारे में कुछ भी पूछें।",
      placeholder: "अपना सवाल यहाँ लिखें...",
      statusActive: "AI सक्रिय है • कभी भी पूछें",
      statusThinking: "जवाब तैयार हो रहा है...",
      errorNetwork: "⚠️ इंटरनेट कनेक्शन नहीं है। कृपया दोबारा कोशिश करें।",
      errorServer: "⚠️ सर्वर से जवाब नहीं मिला। थोड़ी देर बाद कोशिश करें।",
      topics: [
        { icon: "🐛", label: "कीट नियंत्रण", q: "फसल में कीट लग गए हैं, क्या करूं?" },
        { icon: "🌍", label: "मिट्टी जांच", q: "मिट्टी की जांच कैसे करें?" },
        { icon: "🐄", label: "पशु स्वास्थ्य", q: "गाय को बुखार है, क्या दवाई दें?" },
        { icon: "📋", label: "सरकारी योजना", q: "PM किसान योजना के बारे में बताएं" },
        { icon: "🌾", label: "धान खेती", q: "धान की खेती कब और कैसे करें?" },
        { icon: "☁️", label: "मौसम सलाह", q: "मौसम के अनुसार कौन सी फसल लगाएं?" }
      ]
    },
    en: {
      appTitle: "Kisan Mitra",
      appSubtitle: "AI Farm Assistant • Bihar",
      topicsLabel: "Quick Questions",
      welcomeTitle: "Namaste Farmer!",
      welcomeText: "I am your AI farming assistant. Ask me anything about crops, livestock, soil, weather or government schemes.",
      placeholder: "Type your question here...",
      statusActive: "AI is active • Ask anytime",
      statusThinking: "Preparing answer...",
      errorNetwork: "⚠️ No internet connection. Please try again.",
      errorServer: "⚠️ No response from server. Try again later.",
      topics: [
        { icon: "🐛", label: "Pest Control", q: "My crop has pests, what should I do?" },
        { icon: "🌍", label: "Soil Testing", q: "How to test soil quality?" },
        { icon: "🐄", label: "Animal Health", q: "My cow has fever, what medicine to give?" },
        { icon: "📋", label: "Govt Scheme", q: "Tell me about PM Kisan Yojana" },
        { icon: "🌾", label: "Paddy Farming", q: "When and how to grow paddy rice?" },
        { icon: "☁️", label: "Weather Advice", q: "Which crop to plant based on weather?" }
      ]
    }
  };

  // ============================================
  // LANGUAGE TOGGLE
  // ============================================
  function setLang(lang) {
    currentLang = lang;
    document.getElementById('btnHi').classList.toggle('active', lang === 'hi');
    document.getElementById('btnEn').classList.toggle('active', lang === 'en');
    document.documentElement.lang = lang;

    const tx = t[lang];
    document.getElementById('appTitle').textContent = tx.appTitle;
    document.getElementById('appSubtitle').textContent = tx.appSubtitle;
    document.getElementById('topicsLabel').textContent = tx.topicsLabel;
    document.getElementById('welcomeTitle').textContent = tx.welcomeTitle;
    document.getElementById('welcomeText').textContent = tx.welcomeText;
    document.getElementById('userInput').placeholder = tx.placeholder;
    document.getElementById('statusText').textContent = tx.statusActive;

    // Rebuild topic chips
    const grid = document.getElementById('topicsGrid');
    grid.innerHTML = tx.topics.map(tp =>
      `<button class="topic-chip" onclick="quickAsk('${tp.q}')">${tp.icon} ${tp.label}</button>`
    ).join('');
  }

  // ============================================
  // CHAT FUNCTIONS
  // ============================================
  function quickAsk(question) {
    document.getElementById('userInput').value = question;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function addMessage(text, role) {
    const welcomeMsg = document.getElementById('welcomeMsg');
    if (welcomeMsg) welcomeMsg.remove();

    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = role === 'user' ? '👨‍🌾' : '🌱';
    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }

  function showTyping() {
    const welcomeMsg = document.getElementById('welcomeMsg');
    if (welcomeMsg) welcomeMsg.remove();

    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'message bot typing-indicator';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="msg-avatar">🌱</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    `;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;

    document.getElementById('sendBtn').disabled = true;
    document.getElementById('statusText').textContent = t[currentLang].statusThinking;

    addMessage(message, 'user');
    chatHistory.push({ role: 'user', content: message });

    showTyping();

    try {
      let replyText = '';

      if (USE_DIRECT_API && DIRECT_API_KEY) {
        // Direct API (local testing only)
        replyText = await callDirectAPI(message);
      } else {
        // Backend API (production — works in APK)
        replyText = await callBackendAPI(message);
      }

      hideTyping();
      addMessage(replyText, 'bot');
      chatHistory.push({ role: 'assistant', content: replyText });

    } catch (err) {
      hideTyping();
      const errMsg = err.message === 'network'
        ? t[currentLang].errorNetwork
        : t[currentLang].errorServer;

      const chatBox = document.getElementById('chatBox');
      const errDiv = document.createElement('div');
      errDiv.className = 'error-msg';
      errDiv.innerHTML = errMsg;
      chatBox.appendChild(errDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('statusText').textContent = t[currentLang].statusActive;
  }

  // Call your Vercel backend (works everywhere including APK)
  async function callBackendAPI(message) {
    let response;
    try {
      response = await fetch(`${BACKEND_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, language: currentLang, history: chatHistory.slice(-6) })
      });
    } catch (e) {
      throw new Error('network');
    }

    if (!response.ok) throw new Error('server');
    const data = await response.json();
    if (!data.reply) throw new Error('server');
    return data.reply;
  }

  // Direct API call (browser only, for local dev)
  async function callDirectAPI(message) {
    const systemPrompt = currentLang === 'hi'
      ? `आप किसान मित्र हैं — एक AI कृषि सहायक। हमेशा सरल हिंदी में जवाब दें। फसल, मिट्टी, कीट, मौसम, पशुपालन और सरकारी योजनाओं पर व्यावहारिक सलाह दें। जवाब संक्षिप्त और उपयोगी रखें।`
      : `You are Kisan Mitra — an AI agricultural assistant for Indian farmers. Always reply in simple English. Give practical advice about crops, soil, pests, weather, animal husbandry, and government schemes. Keep answers concise and useful.`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': DIRECT_API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        system: systemPrompt,
        messages: chatHistory.slice(-6)
      })
    });

    if (!response.ok) throw new Error('server');
    const data = await response.json();
    return data.content[0].text;
  }

  // ============================================
  // VOICE INPUT
  // ============================================
  function toggleMic() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('आपके browser में voice input support नहीं है।');
      return;
    }

    if (isRecording) {
      recognition.stop();
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = currentLang === 'hi' ? 'hi-IN' : 'en-IN';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '🔴';
    };

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      document.getElementById('userInput').value = transcript;
      autoResize(document.getElementById('userInput'));
    };

    recognition.onend = () => {
      isRecording = false;
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micBtn').textContent = '🎤';
    };

    recognition.onerror = () => {
      isRecording = false;
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micBtn').textContent = '🎤';
    };

    recognition.start();
  }
</script>
